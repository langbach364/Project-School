# Định nghĩa số lượng tiến trình worker
worker_processes auto;
worker_cpu_affinity auto;

events {
    # Cho phép chấp nhận nhiều kết nối cùng lúc
    multi_accept on;

    # Số lượng kết nối tối đa mỗi worker có thể xử lý
    worker_connections 1024;
}

http {
    # Thiết lập mã hóa ký tự
    charset utf-8;
    
    # Bật chế độ gửi file trực tiếp
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Tắt thông tin phiên bản NGINX trong phản hồi
    server_tokens off;

    # Tắt log cho các yêu cầu không tìm thấy
    log_not_found off;

    # Kích thước tối đa của bảng băm các loại MIME
    types_hash_max_size 4096;

    # Kích thước tối đa của thân yêu cầu từ client
    client_max_body_size 16M;

    # Kích thước bucket của bảng băm các loại MIME
    types_hash_bucket_size 128;

    # Thời gian giữ kết nối sống
    keepalive_timeout  65;

    # MIME
    # Bao gồm các loại MIME
    include mime.types;

    # Loại mặc định nếu không xác định được MIME
    default_type application/octet-stream;

    # logging
    # Đường dẫn tới file log truy cập
    access_log /var/log/nginx/access.log;

    # Đường dẫn tới file log lỗi và mức độ cảnh báo
    error_log /var/log/nginx/error.log warn;

    # load configs
    # Bao gồm các cấu hình từ thư mục conf.d và sites-enabled
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # Định nghĩa server lắng nghe trên cổng 80
    server {
        listen       80;
        server_name  191.134.155.12;

        location / {
            # Đường dẫn tới thư mục gốc của tài liệu
            root   /usr/share/nginx/html;

            # Các file index mặc định
            index  index.html index.htm;
        }

        # Trang lỗi tùy chỉnh cho các mã lỗi 500, 502, 503, 504
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }

    # Định nghĩa server lắng nghe trên cổng 8443 với SSL
    server {
        listen       8443 ssl;
        server_name  191.134.155.12;

        # Đường dẫn tới chứng chỉ SSL và khóa riêng
        ssl_certificate      /etc/nginx/certificates/cert.pem;
        ssl_certificate_key  /etc/nginx/certificates/key.pem;

        # Cấu hình bộ nhớ cache và thời gian chờ phiên SSL
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        # Cấu hình các bộ mã hóa SSL
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # Định nghĩa location /login
        location /login {
            # Chuyển tiếp yêu cầu đến API backend tại http://127.0.0.1:8080/login
            proxy_pass http://127.0.0.1:8080/login;

            # Thiết lập các header cho yêu cầu proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Định nghĩa location /register
        location /register {
            # Chuyển tiếp yêu cầu đến API backend tại http://127.0.0.1:8080/register
            proxy_pass http://127.0.0.1:8080/register;
            
            # Thiết lập các header cho yêu cầu proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
