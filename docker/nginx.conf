worker_processes auto;
worker_cpu_affinity auto;

events {
    multi_accept on;
    worker_connections 1024;
}

http {
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 4096;
    client_max_body_size 16M;
    types_hash_bucket_size 128;
    keepalive_timeout 65;
    include mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    server {
        listen 80;
        server_name seller-technology.langbach.io.vn;

        location / {
            proxy_pass http://172.21.0.4:8080; # Sử dụng địa chỉ IP tĩnh của container backend
            proxy_set_header Host $Host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin; # Chuyển tiếp header Origin
        }

        # Cấu hình để phục vụ tệp xác minh từ thư mục webroot
        location ~ /.well-known/acme-challenge {
            root /data/letsencrypt;
            allow all;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    server {
        listen 443 ssl;
        server_name seller-technology.langbach.io.vn;

        ssl_certificate /etc/letsencrypt/live/seller-technology.langbach.io.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/seller-technology.langbach.io.vn/privkey.pem;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://172.21.0.4:8080; # Sử dụng địa chỉ IP tĩnh của container backend
            proxy_set_header Host $Host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin; # Chuyển tiếp header Origin
        }

        location /login {
            proxy_pass http://172.21.0.4:8080/login; # Sử dụng địa chỉ IP tĩnh của container backend
            proxy_set_header Host $Host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin; # Chuyển tiếp header Origin
        }

        location /register {
            proxy_pass http://172.21.0.4:8080/register; # Sử dụng địa chỉ IP tĩnh của container backend
            proxy_set_header Host $Host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin; # Chuyển tiếp header Origin
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
